name: Jules Maintenance Agent

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  jules_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run Jules Agent
        run: |
          python tools/jules.py

      - name: Upload Jules Report
        uses: actions/upload-artifact@v4
        with:
          name: jules-report
          path: JULES_REPORT.md
          retention-days: 5
