# CodeRabbit Configuration File
# Documentation: https://coderabbit.ai/docs/configure-coderabbit

version: "1.0"

language: "en-US"
early_access: true
tone_instructions: "Please provide feedback in a helpful, professional, and friendly tone. Focus on best practices, potential bugs, and performance improvements."

reviews:
  # Enable high-level summary of changes
  high_level_summary: true
  
  # Enable line-by-line feedback
  review_status: true
  
  # Enable auto-review for all PRs
  auto_review:
    enabled: true
    drafts: false
    
  # Collapse scalable comments
  collapse_walkthrough: true

  # Path filters to include/exclude for the review
  path_filters:
    - "!**/*.lock"
    - "!**/*.min.js"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/docs/**"

  # Static analysis tools integration
  # tools:
  #   ruff:
  #     enabled: true
  #     config_file: "pyproject.toml"

chat:
  auto_reply: true

