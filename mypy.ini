[mypy]
# Global mypy configuration for SJ-DAS
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False  # Gradually enable
disallow_any_unimported = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True
show_column_numbers = True

# Per-module options
[mypy-sj_das.utils.*]
disallow_untyped_defs = True  # Strict for utilities

[mypy-sj_das.ui.commands]
disallow_untyped_defs = True  # Strict for commands

[mypy-sj_das.core.exceptions]
disallow_untyped_defs = True  # Strict for exceptions

# Third-party libraries without stubs
[mypy-cv2.*]
ignore_missing_imports = True

[mypy-qfluentwidgets.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-torchvision.*]
ignore_missing_imports = True
